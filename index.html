<style>
:root{
    --bg:#0D0A08;
    --panel:rgba(255,255,255,.08);
    --text:rgba(240,240,240,.96);
    --muted:rgba(240,240,240,.72);
    --line:rgba(240,240,240,.20);

    /* VERDE PREMIUM */
    --accent:#0F5E3B;
    --accent2:#7BC59A;

    --shadow:0 18px 40px rgba(0,0,0,.65);
    --radius:22px;
    --max:980px;
    --font:"Inter", system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial;
}

*{box-sizing:border-box;margin:0;padding:0;}

html,body{
    background:
        radial-gradient(1200px 600px at 20% 0%, rgba(15,94,59,.25), transparent 60%),
        radial-gradient(900px 500px at 90% 10%, rgba(123,197,154,.18), transparent 55%),
        var(--bg);
    color:var(--text);
    font-family:var(--font);
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
    min-height:100vh;
}

/* WRAPPER */
.wrap{
    max-width:var(--max);
    margin:0 auto;
    padding:22px 16px 60px;
}

/* HERO */
.hero{
    border-radius:var(--radius);
    overflow:hidden;
    box-shadow:var(--shadow);
    margin-bottom:22px;
    position:relative;
}

.hero-img{
    width:100%;
    height:210px;
    background-image:url('https://images.unsplash.com/photo-1528605248644-14dd04022da1?auto=format&fit=crop&w=1400&q=70');
    background-size:cover;
    background-position:center;
    filter:brightness(0.75);
}

.hero-overlay{
    position:absolute;
    inset:0;
    background:linear-gradient(120deg, rgba(0,0,0,.65), rgba(0,0,0,.25));
}

.hero-content{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    padding:18px;
}

.hero-title{
    font-size:22px;
    font-weight:700;
    color:var(--accent2);
}

.hero-sub{
    font-size:14px;
    color:var(--muted);
}

header{
    background:rgba(0,0,0,.65);
    border:1px solid var(--line);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:16px 16px 14px;
    position:sticky;
    top:10px;
    backdrop-filter:blur(14px);
    z-index:20;
}

/* CATEGORIE ORIZZONTALI */
.cat-scroll{
    display:flex;
    overflow-x:auto;
    gap:12px;
    padding:12px 4px;
}

.cat-scroll::-webkit-scrollbar{
    height:6px;
}

.cat-scroll::-webkit-scrollbar-thumb{
    background:var(--accent);
    border-radius:10px;
}

.cat-btn{
    padding:12px 18px;
    background:var(--panel);
    border-radius:var(--radius);
    color:var(--accent2);
    font-weight:600;
    border:1px solid var(--line);
    white-space:nowrap;
    cursor:pointer;
    transition:.25s;
    box-shadow:var(--shadow);
}

.cat-btn:hover{
    background:var(--accent2);
    color:#000;
    transform:scale(1.05);
}

/* PANEL */
.panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:20px 18px;
    margin-top:22px;
    box-shadow:var(--shadow);
    display:none;
}

.panel.active{
    display:block;
}

.panel-title{
    font-size:20px;
    font-weight:700;
    color:var(--accent2);
    margin-bottom:6px;
}

.panel-sub{
    font-size:14px;
    color:var(--muted);
    margin-bottom:14px;
}

/* SOTTOCATEGORIE */
.subcat-wrap{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:18px;
}

.subcat-btn{
    padding:12px 16px;
    background:var(--accent);
    border:none;
    border-radius:var(--radius);
    color:#fff;
    font-weight:600;
    cursor:pointer;
    transition:.25s;
    box-shadow:var(--shadow);
}

.subcat-btn:hover{
    background:var(--accent2);
    color:#000;
}

/* LISTA PIATTI */
.item{
    display:flex;
    justify-content:space-between;
    padding:12px 0;
    border-bottom:1px solid var(--line);
    font-size:16px;
}

.item span small{
    color:var(--muted);
    font-size:13px;
}

.price{
    color:var(--accent2);
    font-weight:700;
}

/* FOOTER */
footer{
    text-align:center;
    margin-top:40px;
    color:var(--accent2);
    font-size:14px;
    opacity:.9;
}

/* Responsive tweaks */
@media (max-width:640px){
    .hero-img{height:160px;}
    .panel{padding:16px;}
    .cat-btn{padding:10px 14px;font-size:14px;}
}</script>
